<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sample</title>
    <script>
        function showAlert() {
            console.log("Button was clicked!");
            alert("Button clicked!");
            document.getElementById("result").innerHTML = "Hello, World!";
        }
        function clicksubmit() {
            let name = document.getElementById("name").value;
            console.log("Submitted name: " + name);
            alert("Submitted name: " + name);
        }
    </script>
</head>
<body style="text-align:center; margin-top:50px; background-color: goldenrod;">
    <h2>User Registration Form</h2>
    <form method="post" onsubmit="clicksubmit(); return false;">
        <input type="text" id="name" placeholder="Enter your name" required>
        <br><br>
        <button type="submit">Submit</button>
        <button type="button" onclick="showAlert()">
            Click Here
        </button>
        <button type="button" onclick="window.location.href='home-bs.html'"
            style="background-color:green; color:white;">
            Go Home
        </button>
        <br><br>
        <img src="user form.jpeg" width="200" style="cursor:pointer;"
            onclick="window.location.href='home-bs.html'">
    </form>
    <p id="result"></p>
</body>
</html>
